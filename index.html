<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUATTRO BLOOM - SMAN 71</title>
    
    <link rel="icon" type="image/x-icon" href="src/favicon.ico">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Gaya Tampilan Tombol Musik Di Pojok Kanan Bawah */
        #music-control {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            background: #FF94B9; border: 3px solid #1E1E1E; padding: 12px 20px;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 4px 4px 0px #1E1E1E; transition: 0.1s;
        }
        #music-control:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #1E1E1E; }

        /* Gaya Tampilan Layar Selamat Datang (Splash Screen) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #9BD0F5; /* Warna Biru Bubbles */
            background-image: radial-gradient(#FF94B9 20%, transparent 20%), radial-gradient(#A3E37B 20%, transparent 20%);
            background-size: 40px 40px; background-position: 0 0, 20px 20px;
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .splash-card {
            background: white; border: 5px solid #1E1E1E; padding: 40px;
            border-radius: 30px; text-align: center; max-width: 500px;
            box-shadow: 10px 10px 0px #1E1E1E;
        }
        .splash-logo { height: 80px; margin-bottom: 20px; filter: drop-shadow(2px 2px 0px #000); }
        .splash-card h1 { color: #FF4081; font-size: 32px; margin-bottom: 10px; text-shadow: 2px 2px 0px #000; }
        .splash-card p { font-size: 16px; color: #333; margin-bottom: 30px; line-height: 1.5; }
        
        .splash-btn {
            background: #A3E37B; /* Warna Hijau Buttercup */
            border: 3px solid #1E1E1E; padding: 15px 30px; font-size: 18px;
            font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 5px 5px 0px #1E1E1E; transition: 0.1s;
        }
        .splash-btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px #1E1E1E; background: #FF94B9; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="src/supershy.mp3" loop></audio>
    
    <div id="music-control" onclick="toggleMusic()">🎵 Play/Pause Music</div>

    <div id="splash-screen">
        <div class="splash-card">
            <img src="src/logosman71.png" class="splash-logo" alt="Logo SMAN 71">
            <h1>🌸 QUATTRO BLOOM 🌸</h1>
            <p>Selamat datang di situs tugas Informatika Kelompok QUATTRO BLOOM - Siswa Kelas 10 SMA Negeri 71 Jakarta.</p>
            <button class="splash-btn" onclick="startWebsite()">MASUK WEBSITE 🚀</button>
        </div>
    </div>

    <iframe src="home.html" name="mainFrame"></iframe>

    <script>
        const audio = document.getElementById('bgMusic');
        
        function startWebsite() {
            // Jalankan musik begitu tombol diklik
            audio.play().catch(err => console.log("Gagal memutar audio otomatis:", err));
            // Hilangkan layar selamat datang
            document.getElementById('splash-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
            }, 300);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); } 
            else { audio.pause(); }
        }
    </script>
</body>
</html>
