<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>QUATTRO BLOOM - SMAN 71</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #music-control {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            background: #FF94B9; border: 3px solid #000; padding: 10px;
            border-radius: 50px; cursor: pointer; font-family: 'Arial'; font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="src/supershy.mp3" loop autoplay></audio>
    
    <div id="music-control" onclick="toggleMusic()">🎵 Play/Pause Music</div>

    <iframe src="home.html" name="mainFrame"></iframe>

    <script>
        const audio = document.getElementById('bgMusic');
        function toggleMusic() {
            if (audio.paused) { audio.play(); } 
            else { audio.pause(); }
        }
        // Autoplay handler
        window.addEventListener('click', () => {
            audio.play();
        }, { once: true });
    </script>
</body>
</html>
