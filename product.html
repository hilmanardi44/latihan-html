<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUATTRO BLOOM - Bloom Scrumble Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" src="src/supershy.mp3" loop></audio>

    <header>
        <div class="logo-container">
            <img src="src/logosman71.png" alt="Logo SMAN 71" class="logo-school">
            <span class="site-title">QUATTRO BLOOM</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="design.html">Design</a></li>
                <li><a href="product.html" class="active">Product</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="card-panel">
            <h2 class="text-center" style="color: var(--blossom-dark); text-shadow: 2px 2px 0 #000; font-size: 32px;">🌸 BLOOM SCRUMBLE 🌸</h2>
            
            <div class="game-box" id="gameArea">
                <div class="score-board">
                    <div>Pertanyaan: <span id="wordCount">1</span>/20</div>
                    <div>Skor Anda: <span id="score">0</span></div>
                </div>

                <div class="scrambled-word" id="scrambledDisplay">LOADING...</div>
                
                <div class="hint-box">
                    💡 <strong>Petunjuk:</strong> <span id="hintDisplay">Menghubungkan komputer global.</span>
                </div>

                <input type="text" id="userInput" class="game-input" placeholder="Ketik jawabanmu di sini..." autocomplete="off"><br>
                
                <button class="ppg-btn" onclick="checkAnswer()">Check Answer! 🚀</button>
                <p id="feedback" style="margin-top: 15px; font-weight: 700; font-size: 18px;"></p>
            </div>

            <div class="game-box" id="resultArea" style="display: none;">
                <h3 style="font-size: 28px; color: var(--buttercup-green); text-shadow: 2px 2px 0 #000;">🎉 PERMAINAN SELESAI! 🎉</h3>
                <p style="font-size: 20px; margin: 20px 0;">Hebat! Skor Akhir Kelulusan Kompetensi Kamu:</p>
                <div style="font-size: 64px; font-weight: 800; color: var(--blossom-dark); text-shadow: 3px 3px 0 #000; margin-bottom: 25px;" id="finalScore">0</div>
                <button class="ppg-btn" onclick="resetGame()">Main Lagi 🔄</button>
            </div>
        </div>
    </main>

    <script>
        // Musik Latar Autoplay Handler
        window.addEventListener('click', () => {
            const audio = document.getElementById('bgMusic');
            if(audio.paused) { audio.play(); }
        });

        // Database Game: 20 Istilah Informatika Kelas 10
        const wordBank = [
            { word: "ALGORITMA", hint: "Urutan langkah logis penyelesaian masalah matematika/komputasi." },
            { word: "HARDWARE", hint: "Perangkat keras fisik penyusun sistem komputer." },
            { word: "SOFTWARE", hint: "Perangkat lunak atau program aplikasi komputer." },
            { word: "INTERNET", hint: "Jaringan komunikasi global yang menghubungkan milyaran gawai." },
            { word: "DATA", hint: "Kumpulan fakta mentah yang belum diolah." },
            { word: "DATABASE", hint: "Tempat penyimpanan data yang terstruktur/terorganisir digital." },
            { word: "CODING", hint: "Proses menulis instruksi bahasa pemrograman." },
            { word: "PYTHON", hint: "Salah satu bahasa pemrograman populer bersimbol ular." },
            { word: "SCRATCH", hint: "Platform pemrograman visual blok yang cocok untuk pemula." },
            { word: "NETWORK", hint: "Sistem jaringan interkoneksi antar komputer." },
            { word: "BROWSER", hint: "Software penjelajah web, contoh: Chrome, Firefox." },
            { word: "SECURITY", hint: "Aspek keamanan perlindungan data dari ancaman siber." },
            { word: "PROCESSOR", hint: "Otak utama pemroses instruksi pada CPU komputer." },
            { word: "MEMORY", hint: "Komponen penyimpanan data sementara (RAM) atau permanen." },
            { word: "SYSTEM", hint: "Kesatuan elemen yang saling berinteraksi mencapai tujuan komputasi." },
            { word: "DIGITAL", hint: "Representasi data berbasis biner angka 0 dan 1." },
            { word: "INFORMATIKA", hint: "Nama mata pelajaran teknologi informasi kita saat ini!" },
            { word: "COMPUTING", hint: "Aktivitas penggunaan teknologi komputer secara teknis." },
            { word: "BINARY", hint: "Sistem bilangan berbasis dua simbol logika." },
            { word: "ROBOTIK", hint: "Cabang pemrograman automata alat mekanik pintar otomatis." }
        ];

        let currentWordIndex = 0;
        let currentScore = 0;
        let shuffledBank = [];

        function initGame() {
            // Mengacak urutan soal saat game dimulai
            shuffledBank = [...wordBank].sort(() => Math.random() - 0.5);
            currentWordIndex = 0;
            currentScore = 0;
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            if(currentWordIndex >= 20) {
                endGame();
                return;
            }
            
            document.getElementById('wordCount').innerText = currentWordIndex + 1;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('userInput').value = "";
            document.getElementById('feedback').innerText = "";

            let targetWord = shuffledBank[currentWordIndex].word;
            document.getElementById('hintDisplay').innerText = shuffledBank[currentWordIndex].hint;
            document.getElementById('scrambledDisplay').innerText = scrambleString(targetWord);
        }

        function scrambleString(str) {
            let arr = str.split('');
            // Pastikan acakan tidak sama persis dengan aslinya
            while(arr.join('') === str) {
                arr.sort(() => Math.random() - 0.5);
            }
            return arr.join('');
        }

        function checkAnswer() {
            let userAns = document.getElementById('userInput').value.toUpperCase().trim();
            let realAns = shuffledBank[currentWordIndex].word;
            let feedback = document.getElementById('feedback');

            if(userAns === realAns) {
                currentScore += 5; // Maksimal skor 100 jika benar semua (20 * 5)
                feedback.style.color = "green";
                feedback.innerText = "Benar! Hebat! 🎉";
            } else {
                feedback.style.color = "red";
                feedback.innerText = `Salah! Jawaban yang benar adalah: ${realAns}`;
            }

            currentWordIndex++;
            setTimeout(loadQuestion, 1500);
        }

        function endGame() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('finalScore').innerText = currentScore;
        }

        function resetGame() {
            initGame();
        }

        // Start game otomatis di awal load
        window.onload = initGame;
    </script>
</body>
</html>
